name: docker-image

on:
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI
  IMAGE_NAME: cli-proxy-api
  PANEL_REPOSITORY: ${{ github.repository_owner }}/Cli-Proxy-API-Management-Center

jobs:
  docker_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Checkout management panel
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PANEL_REPOSITORY }}
          path: management-center
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: management-center/package-lock.json
      - name: Build management panel
        working-directory: management-center
        run: |
          npm ci
          npm run build
          mkdir -p ../static
          cp dist/index.html ../static/management.html
          rm -rf ../management-center
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata and Tags
        id: metadata
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image_repo="ghcr.io/${owner}/${IMAGE_NAME}"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${image_repo}:latest"
            echo "${image_repo}:${GITHUB_REF_NAME}"
            echo "${image_repo}:latest-amd64"
            echo "${image_repo}:${GITHUB_REF_NAME}-amd64"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.metadata.outputs.version }}
            COMMIT=${{ steps.metadata.outputs.commit }}
            BUILD_DATE=${{ steps.metadata.outputs.build_date }}
          tags: ${{ steps.metadata.outputs.tags }}
